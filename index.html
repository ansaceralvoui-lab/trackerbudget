<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .balance {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .input-box {
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .add {
            background: #22c55e;
            color: white;
        }

        .reset {
            background: #ef4444;
            color: white;
        }

        ul {
            list-style: none;
            margin-top: 25px;
        }

        li {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .amount {
            font-weight: bold;
        }

        .delete {
            margin-left: 10px;
            cursor: pointer;
            color: #f87171;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Budget Tracker</h1>
            <div class="balance">₱<span id="t">0.00</span></div>
        </div>

        <div class="input-box">
            <input type="text" id="k" placeholder="Item name">
            <input type="number" id="v" placeholder="Amount">

            <div class="button-row">
                <button class="add" onclick="addItem()">Add</button>
                <button class="reset" onclick="resetAll()">Reset</button>
            </div>
        </div>

        <ul id="l"></ul>

    </div>

    <script>

        const SB_URL = "https://hxlpzvgzwjqjfvyujwzi.supabase.co";
        const SB_KEY = "sb_publishable_OaSksRDw1XXS7KM6lRzekg_aQd6Krtl";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const totalEl = document.getElementById('t');
        const listEl = document.getElementById('l');
        const nameInp = document.getElementById('k');
        const amtInp = document.getElementById('v');

        async function showData() {

            let { data, error } = await sb.from('budgetdb').select('*');

            if (error) return console.log(error);

            listEl.innerHTML = "";
            let total = 0;

            data.forEach(item => {

                total += item.amount;

                let li = document.createElement('li');

                li.innerHTML = `
<div class="item-name">
<i class="fas fa-wallet"></i>
${item.item}
</div>

<div>
<span class="amount">₱${item.amount.toFixed(2)}</span>
<i class="fas fa-trash delete" onclick="deleteItem(${item.id})"></i>
</div>
`;

                listEl.appendChild(li);

            });

            totalEl.innerText = total.toLocaleString(undefined, { minimumFractionDigits: 2 });

        }

        async function addItem() {

            const name = nameInp.value;
            const amount = parseFloat(amtInp.value);

            if (name && amount > 0) {

                await sb.from('budgetdb').insert([
                    { item: name, amount: amount }
                ]);

                nameInp.value = "";
                amtInp.value = "";

                showData();

            }

        }

        async function deleteItem(id) {

            await sb.from('budgetdb').delete().eq('id', id);

            showData();

        }

        async function resetAll() {

            if (confirm("Delete all history?")) {

                await sb.from('budgetdb').delete().neq('id', 0);

                showData();

            }

        }

        showData();

    </script>

</body>

</html>
